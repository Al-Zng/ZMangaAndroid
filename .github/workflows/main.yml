name: Build ZManga APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Recreate Android folder with v2 embedding
        run: |
          rm -rf android
          flutter create --platforms android .

      - name: Add INTERNET permission
        run: |
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml

      # ─── إضافة Cookie Bridge (MethodChannel) إلى MainActivity ────────────
      # يستخرج package name تلقائياً من الملف المُولَّد ويُعيد كتابته
      # هذا يُمكّن Flutter من قراءة cf_clearance من Android CookieManager
      - name: Patch MainActivity with Cookie Bridge MethodChannel
        run: |
          python3 - << 'PYEOF'
          import pathlib, re

          # البحث التلقائي عن MainActivity.kt بغض النظر عن package name
          matches = list(pathlib.Path('android').rglob('MainActivity.kt'))
          if not matches:
              raise FileNotFoundError("MainActivity.kt not found!")
          path = matches[0]

          # استخراج package name من الملف المُولَّد
          original = path.read_text()
          pkg_match = re.search(r'package\s+(\S+)', original)
          if not pkg_match:
              raise ValueError("Could not find package declaration")
          package = pkg_match.group(1)
          print(f"Package: {package}")

          # كتابة MainActivity الكاملة مع MethodChannel
          new_content = f"""package {package}

import io.flutter.embedding.android.FlutterActivity
import io.flutter.embedding.engine.FlutterEngine
import io.flutter.plugin.common.MethodChannel
import android.webkit.CookieManager

class MainActivity : FlutterActivity() {{

    override fun configureFlutterEngine(flutterEngine: FlutterEngine) {{
        super.configureFlutterEngine(flutterEngine)

        // ─── Cookie Bridge: يُرجع كوكيز Android WebView (بما فيها cf_clearance) ───
        // مطابق لـ iOS: WKWebsiteDataStore.default().httpCookieStore.getAllCookies()
        MethodChannel(
            flutterEngine.dartExecutor.binaryMessenger,
            "zmanga/cookies"
        ).setMethodCallHandler {{ call, result ->
            when (call.method) {{
                "getCookies" -> {{
                    val url = call.argument<String>("url") ?: ""
                    val cookies = try {{
                        CookieManager.getInstance().getCookie(url) ?: ""
                    }} catch (e: Exception) {{
                        ""
                    }}
                    result.success(cookies)
                }}
                else -> result.notImplemented()
            }}
        }}
    }}
}}
"""
          path.write_text(new_content)
          print(f"✅ Patched: {path}")
          PYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload all APKs
        uses: actions/upload-artifact@v4
        with:
          name: ZManga-APKs
          path: build/app/outputs/flutter-apk/app-*-release.apk
