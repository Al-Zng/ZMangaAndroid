name: Build ZManga APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Recreate Android folder with v2 embedding
        run: |
          rm -rf android
          flutter create --platforms android .

      - name: Add INTERNET permission
        run: |
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml

      - name: Patch MainActivity with Cookie Bridge MethodChannel
        run: |
          MAIN_KT=$(find android -name "MainActivity.kt" | head -1)
          PKG=$(grep -oP 'package\s+\K\S+' "$MAIN_KT")
          echo "Package: $PKG"
          sed "s/__PACKAGE__/$PKG/" ci/MainActivity.kt > "$MAIN_KT"
          echo "Patched: $MAIN_KT"
          cat "$MAIN_KT"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload all APKs
        uses: actions/upload-artifact@v4
        with:
          name: ZManga-APKs
          path: build/app/outputs/flutter-apk/app-*-release.apk
