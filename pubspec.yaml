name: zmanga
description: A ZManga Android Application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  provider: ^6.0.5
  webview_flutter: ^4.4.0
  flutter_inappwebview: ^6.0.0
  cached_network_image: ^3.3.0
  html: ^0.15.4
  path_provider: ^2.1.0
  url_launcher: ^6.1.14
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
  fonts:
    - family: ZMangaIcons
      fonts:
        - asset: assets/fonts/ZMangaIcons.ttf