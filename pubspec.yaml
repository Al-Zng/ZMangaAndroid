name: zmanga
description: ZManga - Flutter manga reader app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  webview_flutter: ^4.4.2
  html: ^0.15.4
  intl: ^0.18.1
  http: ^1.1.0
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true